<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Intake Form</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background: #ffffff; padding: 20px; border-radius: 5px; box-shadow: 0px 0px 10px #ccc;">

        <h2 style="text-align: center; color: #333;">
            PATIENT INTAKE FORM
        </h2>

        <p>Dear Patient,</p>

        <p>
            Please complete your Patient Intake Form by clicking the link below:
        </p>

        <p style="text-align: center;">
            <a href="{RESET_LINK}"
               style="display: inline-block; background-color: #007bff; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-size: 16px;">
                Fill Intake Form
            </a>
        </p>

        <p>
            This form is required to collect important information regarding your medical history and visit details.
        </p>

        <p>
            Thank you for your cooperation.<br />
            PainTrax
        </p>

    </div>
</body>
</html>
